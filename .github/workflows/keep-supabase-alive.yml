name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 10 */3 * *"  # alle 3 Tage um 10:00 UTC
  workflow_dispatch:         # manuell auslösbar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Health
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Error: VITE_SUPABASE_URL secret is not set in GitHub repository secrets!"
            exit 1
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/auth/v1/health")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Supabase health check failed with status $STATUS!"
            exit 1
          fi
          echo "Supabase is alive!"
